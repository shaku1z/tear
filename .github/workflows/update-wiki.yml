name: Synchronize TEAR Wiki

on:
  push:
    branches: [main]
    paths:
      - 'js/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the exact game revision to the wiki
        env:
          WIKI_DEPLOY_TOKEN: ${{ secrets.WIKI_DEPLOY_TOKEN }}
          GAME_COMMIT: ${{ github.sha }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${WIKI_DEPLOY_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "{\"event_type\":\"tear-game-updated\",\"client_payload\":{\"game_commit\":\"${GAME_COMMIT}\"}}" \
            https://api.github.com/repos/shaku1z/tear-wiki/dispatches
