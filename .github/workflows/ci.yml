name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: xvfb-run -a pnpm check
        env:
          TEAR_HEADED_VISIBILITY: "1"
      - uses: actions/upload-artifact@v4
        with:
          name: tear-release-targets
          path: |
            dist
            artifacts/tear-crazygames.zip
          if-no-files-found: error
          retention-days: 14
