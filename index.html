<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tear — prototype</title>
  <!-- CrazyGames SDK (v3). Harmless off-platform: the wrapper in crazy.js is env-gated. -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }
    #wrap {
      position: relative;
      width: min(96vw, 170vh);
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
      border: 2px solid #000;
      cursor: none;
      image-rendering: auto;
    }
    #hint {
      position: absolute;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
      color: #888;
      pointer-events: none;
      user-select: none;
    }
    #fs {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      background: #fff;
      color: #000;
      border: 2px solid #000;
      cursor: pointer;
    }
    #fs:hover { background: #000; color: #fff; }
    #lockhint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #000;
      background: rgba(255, 255, 255, 0.85);
      border: 2px solid #000;
      padding: 10px 18px;
      pointer-events: none;
      user-select: none;
    }
    /* fullscreen: center + letterbox the canvas. object-fit:contain keeps the 16:9
       frame undistorted on ANY display (16:10 laptops, ultrawides) — no stretch. */
    #wrap:fullscreen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0b10;        /* letterbox bars: deep void, reads intentional */
    }
    #wrap:fullscreen canvas { width: 100%; height: 100%; object-fit: contain; border: none; }
    /* the page's own fullscreen button + controls hint don't belong over the fullscreen canvas */
    #wrap:fullscreen #fs,
    #wrap:fullscreen #hint { display: none; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="1280" height="720"></canvas>
    <button id="fs">⛶ fullscreen</button>
    <div id="lockhint">click to capture mouse</div>
    <div id="hint">A/D move &nbsp;·&nbsp; W/Space jump &nbsp;·&nbsp; hold S drop through &nbsp;·&nbsp; Shift dash &nbsp;·&nbsp; mouse = blade &nbsp;·&nbsp; right-click throw / recall &nbsp;·&nbsp; P pause</div>
  </div>

  <!-- load order matters: these are plain scripts sharing global scope -->
  <!-- ?v cache-bust: bump if the browser ever serves stale JS (server is no-cache too) -->
  <script src="js/config.js?v=85"></script>
  <script src="js/stages.js?v=85"></script>
  <script src="js/utils.js?v=85"></script>
  <script src="js/ui.js?v=85"></script>
  <script src="js/audio.js?v=85"></script>
  <script src="js/input.js?v=85"></script>
  <script src="js/particles.js?v=85"></script>
  <script src="js/backdrop.js?v=85"></script>
  <script src="js/attract.js?v=85"></script>
  <script src="js/crazy.js?v=85"></script>
  <script src="js/upgrades.js?v=85"></script>
  <script src="js/meta.js?v=85"></script>
  <script src="js/weapons.js?v=85"></script>
  <script src="js/affixes.js?v=85"></script>
  <script src="js/variants.js?v=85"></script>
  <script src="js/blade.js?v=85"></script>
  <script src="js/player.js?v=85"></script>
  <script src="js/projectile.js?v=85"></script>
  <script src="js/enemy.js?v=85"></script>
  <script src="js/game.js?v=85"></script>
</body>
</html>
