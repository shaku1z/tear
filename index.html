<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tear — prototype</title>
  <!-- CrazyGames SDK (v3). Harmless off-platform: the wrapper in crazy.js is env-gated. -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <style>
    /* EDGE-TO-EDGE: the game IS the page. The canvas fills the whole viewport in every
       context (windowed, fullscreen, the CrazyGames iframe) and the OVERSCAN system
       bleeds the scene into any non-16:9 leftover — so there is never a border, a bar,
       or a page background peeking through. */
    html, body {
      margin: 0;
      height: 100%;
      background: #0a0b10;
      font-family: "Courier New", monospace;
      overflow: hidden;
      /* mobile: the game owns every gesture — no text selection, no pull-to-refresh,
         no back-swipe, no double-tap zoom */
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    /* invisible probe measuring the hardware safe-area insets (notches / islands);
       the game reads its computed padding and keeps HUD + touch controls inside */
    #safeprobe {
      position: fixed;
      visibility: hidden;
      pointer-events: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0b10;   /* first-frame failsafe only — the game paints every pixel */
      cursor: none;
      image-rendering: auto;
      touch-action: none;    /* mobile: the game owns every gesture (no scroll/zoom) */
    }
    #hint {
      position: absolute;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
      color: #888;
      pointer-events: none;
      user-select: none;
    }
    #fs {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      background: #fff;
      color: #000;
      border: 2px solid #000;
      cursor: pointer;
    }
    #fs:hover { background: #000; color: #fff; }
    #lockhint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #000;
      background: rgba(255, 255, 255, 0.85);
      border: 2px solid #000;
      padding: 10px 18px;
      pointer-events: none;
      user-select: none;
    }
    /* fullscreen: layout is already edge-to-edge; just drop the page's own chrome */
    #wrap:fullscreen #fs,
    #wrap:fullscreen #hint { display: none; }

    #nameInput {
      position: absolute;
      display: none;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: inherit; /* will match game's font */
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      padding: 0;
      margin: 0;
      /* the JS logic will set top/left/width/height/font-size to match the canvas panel exactly */
    }
  </style>
</head>
<body>
  <div id="safeprobe"></div>
  <div id="wrap">
    <canvas id="game" width="1280" height="720"></canvas>
    <input type="text" id="nameInput" maxlength="16" autocomplete="off" spellcheck="false" />
    <button id="fs">⛶ fullscreen</button>
    <div id="lockhint">click to capture mouse</div>
    <div id="hint">A/D move &nbsp;·&nbsp; W/Space jump &nbsp;·&nbsp; hold S drop through &nbsp;·&nbsp; Shift dash &nbsp;·&nbsp; mouse = blade &nbsp;·&nbsp; right-click throw / recall &nbsp;·&nbsp; P pause</div>
  </div>

  <!-- load order matters: these are plain scripts sharing global scope -->
  <!-- ?v cache-bust: bump if the browser ever serves stale JS (server is no-cache too) -->
  <script src="js/config.js?v=121"></script>
  <script src="js/stages.js?v=121"></script>
  <script src="js/utils.js?v=121"></script>
  <script src="js/ui.js?v=121"></script>
  <script src="js/audio.js?v=121"></script>
  <script src="js/input.js?v=121"></script>
  <script src="js/particles.js?v=121"></script>
  <script src="js/backdrop.js?v=121"></script>
  <script src="js/attract.js?v=121"></script>
  <script src="js/crazy.js?v=121"></script>
  <script src="js/firebase-config.js?v=121"></script>
  <script src="js/profile.js?v=121"></script>
  <script src="js/achievements.js?v=121"></script>
  <script src="js/challenges.js?v=121"></script>
  <script src="js/upgrades.js?v=121"></script>
  <script src="js/meta.js?v=121"></script>
  <script src="js/weapons.js?v=121"></script>
  <script src="js/affixes.js?v=121"></script>
  <script src="js/variants.js?v=121"></script>
  <script src="js/blade.js?v=121"></script>
  <script src="js/player.js?v=121"></script>
  <script src="js/projectile.js?v=121"></script>
  <script src="js/enemy.js?v=121"></script>
  <script src="js/ghost.js?v=121"></script>
  <script src="js/cloud.js?v=121"></script>
  <script src="js/game.js?v=121"></script>
</body>
</html>
