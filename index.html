<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/branding/icons/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TEAR: BLADE</title>
  <!-- TEAR_STANDALONE_PWA_START -->
  <!-- PWA: installable on the standalone site (tearblade.com) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0a0b10" />
  <link rel="apple-touch-icon" href="/branding/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TEAR" />
  <!-- TEAR_STANDALONE_PWA_END -->
  <!-- Chapter typography: self-hosted (latin subset) so cinematics never make a
       runtime web-font request. Courier/Arial fall back while these load. -->
  <link rel="preload" href="/fonts/BarlowCondensed-SemiBold.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/IBMPlexMono-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <!-- TEAR_PLATFORM_SDK -->
  <style>
    /* Bundled chapter fonts — see fonts/OFL.txt (SIL Open Font License 1.1) */
    @font-face {
      font-family: 'Barlow Condensed'; font-style: normal; font-weight: 600; font-display: swap;
      src: url(/fonts/BarlowCondensed-SemiBold.woff2) format('woff2');
    }
    @font-face {
      font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 400; font-display: swap;
      src: url(/fonts/IBMPlexMono-Regular.woff2) format('woff2');
    }
    @font-face {
      font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 500; font-display: swap;
      src: url(/fonts/IBMPlexMono-Medium.woff2) format('woff2');
    }
    /* EDGE-TO-EDGE: the game IS the page. The canvas fills the whole viewport in every
       context (windowed, fullscreen, the CrazyGames iframe) and the OVERSCAN system
       bleeds the scene into any non-16:9 leftover — so there is never a border, a bar,
       or a page background peeking through. */
    html, body {
      margin: 0;
      height: 100%;
      background: #0a0b10;
      font-family: "Courier New", "Nimbus Mono PS", "Liberation Mono", monospace;
      overflow: hidden;
      /* mobile: the game owns every gesture — no text selection, no pull-to-refresh,
         no back-swipe, no double-tap zoom */
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    /* invisible probe measuring the hardware safe-area insets (notches / islands);
       the game reads its computed padding and keeps HUD + touch controls inside */
    #safeprobe {
      position: fixed;
      visibility: hidden;
      pointer-events: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0b10;   /* first-frame failsafe only — the game paints every pixel */
      cursor: none;
      image-rendering: auto;
      touch-action: none;    /* mobile: the game owns every gesture (no scroll/zoom) */
    }
    /* input-modality cursor ownership: the pointer is visible only when the mouse
       owns the UI (data-imode set each frame from Input.mode). Keyboard, gamepad,
       and touch keep it hidden. Pointer-lock still hides it during play regardless. */
    body[data-imode="mouse"] canvas { cursor: default; }
    #hint {
      position: absolute;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
      color: #888;
      pointer-events: none;
      user-select: none;
    }
    #fs {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      background: #fff;
      color: #000;
      border: 2px solid #000;
      cursor: pointer;
    }
    #fs:hover { background: #000; color: #fff; }
    #lockhint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #000;
      background: rgba(255, 255, 255, 0.85);
      border: 2px solid #000;
      padding: 10px 18px;
      pointer-events: none;
      user-select: none;
    }
    /* fullscreen: layout is already edge-to-edge; just drop the page's own chrome */
    #wrap:fullscreen #fs,
    #wrap:fullscreen #hint { display: none; }

    #nameInput {
      position: absolute;
      display: none;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: inherit; /* will match game's font */
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      padding: 0;
      margin: 0;
      /* the JS logic will set top/left/width/height/font-size to match the canvas panel exactly */
    }
  </style>
</head>
<body>
  <div id="safeprobe"></div>
  <div id="wrap">
    <canvas id="game" width="1280" height="720"></canvas>
    <input type="text" id="nameInput" maxlength="16" autocomplete="off" spellcheck="false" />
    <button id="fs">⛶ fullscreen</button>
    <div id="lockhint">click to capture mouse</div>
    <div id="hint">A/D move &nbsp;·&nbsp; W/Space jump &nbsp;·&nbsp; hold S drop through &nbsp;·&nbsp; Shift dash &nbsp;·&nbsp; mouse = blade &nbsp;·&nbsp; right-click throw / recall &nbsp;·&nbsp; P pause</div>
  </div>

  <!-- TEAR_ENTRYPOINT -->
</body>
</html>
